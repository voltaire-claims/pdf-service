name: CI/CD

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    container: python:3.14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check .

      - name: Tests
        run: uv run pytest

  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get project version
        id: version
        run: |
          pip install uv
          echo "value=$(uv version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Check version tag doesn't already exist
        id: tag-check
        uses: tyriis/docker-image-tag-exists@v2.1.0
        with:
          registry: ghcr.io
          repository: voltaire-claims/pdf-service
          tag: ${{ steps.version.outputs.value }}

      - if: steps.tag-check.outputs.tag == 'found'
        run: |
          echo "::error::Image tag '${{ steps.version.outputs.value }}' already exists in ghcr.io. Bump the version in pyproject.toml before merging."
          exit 1

      - id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/voltaire-claims/pdf-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=${{ steps.version.outputs.value }}

      - uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      version: ${{ steps.version.outputs.value }}

  release:
    runs-on: ubuntu-latest
    needs: cd
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          VERSION: v${{ needs.cd.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.cd.outputs.version }}
        run: gh release create "$VERSION" --generate-notes --title "$VERSION"
