name: CI/CD

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    container: python:3.14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check .

      - name: Tests
        run: uv run pytest

  cd-preflight:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Get project version
        id: version
        run: |
          pip install uv
          echo "value=$(uv version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version tag doesn't already exist
        id: tag-check
        uses: tyriis/docker-image-tag-exists@v2.1.0
        with:
          registry: ghcr.io
          repository: voltaire-claims/pdf-service
          tag: ${{ steps.version.outputs.value }}

      - if: steps.tag-check.outputs.tag == 'found'
        run: |
          echo "::error::Image tag '${{ steps.version.outputs.value }}' already exists in ghcr.io. Bump the version in pyproject.toml before merging."
          exit 1

  cd-build:
    needs: cd-preflight
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push digest
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/voltaire-claims/pdf-service,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  cd-manifest:
    runs-on: ubuntu-latest
    needs: [cd-preflight, cd-build]
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/voltaire-claims/pdf-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=${{ needs.cd-preflight.outputs.version }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/voltaire-claims/pdf-service@sha256:%s ' *)

  release:
    runs-on: ubuntu-latest
    needs: [cd-preflight, cd-manifest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          VERSION: v${{ needs.cd-preflight.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.cd-preflight.outputs.version }}
        run: gh release create "$VERSION" --generate-notes --title "$VERSION"
